<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0E111B"/>
      <stop offset="0.35" stop-color="#1B6CA8"/>
      <stop offset="0.75" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="glass" x1="340" y1="250" x2="1260" y2="850" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1600" height="1000" rx="40" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="260" y="210" width="1080" height="640" rx="28" fill="url(#glass)"/>
    <rect x="300" y="250" width="520" height="360" rx="22" fill="#0B1020" fill-opacity="0.38"/>
    <rect x="860" y="250" width="440" height="110" rx="18" fill="#0B1020" fill-opacity="0.32"/>
    <rect x="860" y="390" width="440" height="70" rx="16" fill="#0B1020" fill-opacity="0.24"/>
    <rect x="860" y="480" width="260" height="70" rx="16" fill="#0B1020" fill-opacity="0.20"/>
    <rect x="860" y="570" width="320" height="160" rx="20" fill="#0B1020" fill-opacity="0.14"/>
  </g>

  <g opacity="0.9">
    <circle cx="1210" cy="190" r="3" fill="white" fill-opacity="0.75"/>
    <circle cx="1300" cy="220" r="2" fill="white" fill-opacity="0.65"/>
    <circle cx="330" cy="160" r="2.5" fill="white" fill-opacity="0.7"/>
  </g>
</svg>
