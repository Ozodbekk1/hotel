<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#061018"/>
      <stop offset="0.35" stop-color="#10B981"/>
      <stop offset="0.7" stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#F472B6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1120 260) rotate(135) scale(780 520)">
      <stop stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1600" height="1000" rx="40" fill="url(#bg)"/>
  <rect width="1600" height="1000" rx="40" fill="url(#glow)"/>

  <g filter="url(#shadow)">
    <rect x="240" y="220" width="1120" height="620" rx="28" fill="#0B1020" fill-opacity="0.22"/>
    <rect x="290" y="270" width="1020" height="220" rx="24" fill="#FFFFFF" fill-opacity="0.10"/>
    <rect x="290" y="520" width="520" height="270" rx="24" fill="#FFFFFF" fill-opacity="0.08"/>
    <rect x="840" y="520" width="470" height="140" rx="22" fill="#FFFFFF" fill-opacity="0.08"/>
    <rect x="840" y="680" width="300" height="110" rx="20" fill="#FFFFFF" fill-opacity="0.06"/>
  </g>
</svg>
