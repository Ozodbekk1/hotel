<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A0B12"/>
      <stop offset="0.32" stop-color="#EF4444"/>
      <stop offset="0.68" stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <linearGradient id="overlay" x1="0" y1="0" x2="0" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#000000" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.55"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1600" height="1000" rx="40" fill="url(#bg)"/>
  <rect width="1600" height="1000" rx="40" fill="url(#overlay)"/>

  <g filter="url(#shadow)">
    <rect x="210" y="240" width="1180" height="590" rx="30" fill="#FFFFFF" fill-opacity="0.09"/>
    <rect x="260" y="290" width="520" height="490" rx="26" fill="#0B1020" fill-opacity="0.22"/>
    <rect x="810" y="290" width="530" height="160" rx="22" fill="#0B1020" fill-opacity="0.18"/>
    <rect x="810" y="480" width="410" height="90" rx="18" fill="#0B1020" fill-opacity="0.14"/>
    <rect x="810" y="590" width="300" height="190" rx="22" fill="#0B1020" fill-opacity="0.12"/>
  </g>
</svg>
